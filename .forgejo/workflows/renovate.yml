name: Renovate

on:
  schedule:
    - cron: '0 6 */3 * *'
  workflow_dispatch:

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Renovate
        env:
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
          RENOVATE_PLATFORM: forgejo
          RENOVATE_ENDPOINT: https://git.at.oechsler.it/
          RENOVATE_REPOSITORIES: '["samuel/nix"]'
          RENOVATE_GIT_AUTHOR: Renovate Bot <renovate@git.at.oechsler.it>
          LOG_LEVEL: info
        run: npx --yes renovate
