name: Update Kernel

on:
  schedule:
    - cron: "0 6 */14 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    name: Check and update CachyOS kernel
    runs-on: ubuntu-latest

    steps:
      - name: Set kernel repo variables
        id: kernel-repo
        run: |
          echo "KERNEL_REPO=github:xddxdd/nix-cachyos-kernel" >> "$GITHUB_OUTPUT"
          echo "KERNEL_GITHUB_REPO=xddxdd/nix-cachyos-kernel" >> "$GITHUB_OUTPUT"
          echo "KERNEL_BRANCH=master" >> "$GITHUB_OUTPUT"
          echo "KERNEL_VERSION_JSON_URL=https://raw.githubusercontent.com/xddxdd/nix-cachyos-kernel/master/kernel-cachyos/version.json" >> "$GITHUB_OUTPUT"
          echo "KERNEL_LOCK_URL=https://raw.githubusercontent.com/xddxdd/nix-cachyos-kernel/master/flake.lock" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: true

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Get current kernel version
        id: current-kernel
        run: |
          KERNEL_REPO="${{ steps.kernel-repo.outputs.KERNEL_REPO }}"
          CURRENT_COMMIT=$(grep -oE "$KERNEL_REPO/[a-f0-9]{40}" flake.nix | cut -d'/' -f3)
          echo "commit=$CURRENT_COMMIT" >> "$GITHUB_OUTPUT"
          CURRENT_NIXPKGS_KERNEL=$(grep -oE 'github:nixos/nixpkgs/[a-f0-9]{40}' flake.nix | cut -d'/' -f3)
          echo "nixpkgs_kernel_commit=$CURRENT_NIXPKGS_KERNEL" >> "$GITHUB_OUTPUT"

      - name: Fetch latest cachyos-kernel commit
        id: latest-kernel
        run: |
          LATEST_COMMIT=$(curl -fsSL "https://api.github.com/repos/${{ steps.kernel-repo.outputs.KERNEL_GITHUB_REPO }}/commits/${{ steps.kernel-repo.outputs.KERNEL_BRANCH }}" | jq -r '.sha')
          echo "commit=$LATEST_COMMIT" >> "$GITHUB_OUTPUT"
          echo "short_commit=${LATEST_COMMIT:0:8}" >> "$GITHUB_OUTPUT"
          LATEST_NIXPKGS_KERNEL=$(curl -fsSL "${{ steps.kernel-repo.outputs.KERNEL_LOCK_URL }}" | jq -r '.nodes.nixpkgs.locked.rev')
          echo "nixpkgs_kernel_commit=$LATEST_NIXPKGS_KERNEL" >> "$GITHUB_OUTPUT"

      - name: Check if update is needed
        id: check-update
        run: |
          if [ "${{ steps.current-kernel.outputs.commit }}" != "${{ steps.latest-kernel.outputs.commit }}" ]; then
            echo "needs_update=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update flake.nix with new kernel commits
        if: steps.check-update.outputs.needs_update == 'true'
        run: |
          sed -i "s|${{ steps.kernel-repo.outputs.KERNEL_REPO }}/[a-f0-9]\{40\}|${{ steps.kernel-repo.outputs.KERNEL_REPO }}/${{ steps.latest-kernel.outputs.commit }}|" flake.nix
          sed -i "s|github:nixos/nixpkgs/[a-f0-9]\{40\}|github:nixos/nixpkgs/${{ steps.latest-kernel.outputs.nixpkgs_kernel_commit }}|" flake.nix
          LATEST_KERNEL_VERSION=$(curl -fsSL "${{ steps.kernel-repo.outputs.KERNEL_VERSION_JSON_URL }}" | jq -r '.latest.version')
          sed -i "s|Current: rev [a-f0-9]\{8\} ([0-9-]\{10\}), kernel [0-9.]*|Current: rev ${{ steps.latest-kernel.outputs.short_commit }} ($(date +%Y-%m-%d)), kernel $LATEST_KERNEL_VERSION|" flake.nix

      - name: Update flake.lock
        if: steps.check-update.outputs.needs_update == 'true'
        run: nix flake update cachyos-kernel nixpkgs-kernel

      - name: Validate configurations (dry-run)
        if: steps.check-update.outputs.needs_update == 'true'
        run: nix build .#nixosConfigurations.samuels-razer.config.system.build.toplevel --dry-run && nix build .#nixosConfigurations.samuels-pc.config.system.build.toplevel --dry-run

      - name: Commit and push kernel update
        if: steps.check-update.outputs.needs_update == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flake.nix flake.lock
          git commit -m "chore: bump cachyos-kernel to ${{ steps.latest-kernel.outputs.short_commit }}"
          git push
