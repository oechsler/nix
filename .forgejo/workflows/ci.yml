# NixOS Configuration CI/CD Pipeline
#
# Comprehensive quality checks and build validation.
#
# Runs on:
# - Push to main
# - Pull requests against main
#
# Jobs:
# 1. Lint: Code quality checks (conventions, anti-patterns, dead code)
# 2. Build: Validate all host configurations evaluate successfully

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  #===========================================================================
  # Job 1: Code Quality Checks
  #===========================================================================
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Run custom convention linter
        run: nix build .#checks.x86_64-linux.lint --show-trace

      - name: Run statix (anti-patterns)
        run: nix build .#checks.x86_64-linux.statix --show-trace

      - name: Run deadnix (dead code detection)
        run: nix build .#checks.x86_64-linux.deadnix --show-trace

  #===========================================================================
  # Job 2: Build Validation
  #===========================================================================
  build:
    name: Build NixOS configurations
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Evaluate samuels-terra
        run: nix eval .#nixosConfigurations.samuels-terra.config.system.build.toplevel

      - name: Evaluate samuels-pc
        run: nix eval .#nixosConfigurations.samuels-pc.config.system.build.toplevel

      - name: Evaluate samuels-ser9
        run: nix eval .#nixosConfigurations.samuels-ser9.config.system.build.toplevel

      - name: Evaluate samuels-razer
        run: nix eval .#nixosConfigurations.samuels-razer.config.system.build.toplevel
